<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - MedGame</title>
    <link rel="icon" type="image/png" href="assets/images/icone.webp">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/device-check.css">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/three-background.js"></script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="canvas-container"></div>
    
    <div class="profile-overlay">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Retour à l'accueil
        </a>
        
        <div class="profile-container">
            <!-- Header -->
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user-md"></i>
                </div>
                <div class="profile-info">
                    <h1 id="profile-username">Chargement...</h1>
                    <div class="profile-level">
                        <span class="level-badge" id="level-badge">Niv. 1</span>
                        <div class="xp-progress">
                            <div class="xp-bar" id="xp-bar" style="width: 0%"></div>
                        </div>
                        <span class="xp-text" id="xp-text">0 / 150 XP</span>
                    </div>
                </div>
            </div>
            
            <!-- Statistiques principales -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <span class="stat-value" id="total-cases">--</span>
                    <span class="stat-label">Cas joués</span>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <span class="stat-value" id="accuracy">--%</span>
                    <span class="stat-label">Précision moyenne</span>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <span class="stat-value" id="avg-time">--min</span>
                    <span class="stat-label">Temps moyen</span>
                </div>
                <div class="stat-card highlight">
                    <div class="stat-icon">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <span class="stat-value" id="total-xp">--</span>
                    <span class="stat-label">XP Total</span>
                </div>
            </div>
            
            <!-- Deux colonnes : Spécialités + Historique -->
            <div class="profile-columns">
                <!-- Spécialités favorites -->
                <div class="profile-card">
                    <h3><i class="fas fa-heartbeat"></i> Spécialités</h3>
                    <div class="specialties-list" id="specialties-list">
                        <div class="loading-placeholder">Chargement...</div>
                    </div>
                </div>
                
                <!-- Historique récent -->
                <div class="profile-card">
                    <h3><i class="fas fa-history"></i> Historique récent</h3>
                    <div class="history-list" id="history-list">
                        <div class="loading-placeholder">Chargement...</div>
                    </div>
                </div>
            </div>
            
            <!-- Badges -->
            <div class="profile-card badges-card">
                <h3><i class="fas fa-medal"></i> Badges débloqués</h3>
                <div class="badges-grid" id="badges-grid">
                    <div class="badge disabled">
                        <i class="fas fa-user-md"></i>
                        <span>Premier cas</span>
                    </div>
                    <div class="badge disabled">
                        <i class="fas fa-star"></i>
                        <span>10 Cas</span>
                    </div>
                    <div class="badge disabled">
                        <i class="fas fa-bolt"></i>
                        <span>Score Parfait</span>
                    </div>
                    <div class="badge disabled">
                        <i class="fas fa-clock"></i>
                        <span>Rapide</span>
                    </div>
                    <div class="badge disabled">
                        <i class="fas fa-heart"></i>
                        <span>Cardio</span>
                    </div>
                    <div class="badge disabled">
                        <i class="fas fa-brain"></i>
                        <span>Neuro</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/device-check.js"></script>
</body>

</html>
