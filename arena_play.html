<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena - MedGame</title>
    <link rel="icon" type="image/png" href="assets/images/icone.webp">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Icons & Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/arena.css?v=2">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="arena-bg"></div>

    <div class="arena-player-container">

        <button onclick="window.location.href='index.html'" aria-label="Quitter l'arena et retourner à l'accueil"
            style="position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; color: white; cursor: pointer; z-index: 100; min-height: 44px; min-width: 44px;">
            <i class="fas fa-arrow-left" aria-hidden="true"></i> Quitter
        </button>

        <!-- Player Identification Badge -->
        <div id="player-badge"
            style="position: absolute; top: 20px; right: 20px; background: rgba(0,242,254,0.15); border: 1px solid rgba(0,242,254,0.5); padding: 8px 15px; border-radius: 20px; color: #00f2fe; z-index: 100; font-weight: bold; display: none;"
            role="status" aria-live="polite">
            <i class="fas fa-user-md" aria-hidden="true"></i> <span id="player-name">...</span>
        </div>

        <div id="arena-play-root" class="arena-player-card" role="main" aria-label="Zone de jeu Arena">
            <!-- Loading State -->
            <div class="empty-state" style="padding: 40px 0;" role="status" aria-live="polite">
                <i class="fas fa-circle-notch fa-spin fa-3x" style="color: #00f2fe;" aria-hidden="true"></i>
                <p style="margin-top: 20px; color: rgba(255,255,255,0.7);">Connexion à l'événement en cours...</p>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/env.js?v=2"></script>
    <script src="js/config.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/arena_play.js?v=2"></script>

</body>

</html>
